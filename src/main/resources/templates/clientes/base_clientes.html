<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Clientes</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" >
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <h1>Bienvenido a Clientes</h1>
    <hr>

    <!-- Botón para Nuevo Cliente -->
    <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalNuevoCliente">
        <i class="fa-solid fa-plus"></i> Nuevo Cliente
    </button>

    <table class="table mt-3">
        <thead>
        <tr>
            <th scope="col">ID</th>
            <th scope="col">CLIENTE</th>
            <th scope="col">TELEFONO</th>
            <th scope="col">DIRECCION</th>
            <th scope="col">ACCION</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="client : ${clients}">
            <td th:text="${client.id}"></td>
            <td th:text="${client.nombre}"></td>
            <td th:text="${client.telefono}"></td>
            <td th:text="${client.direccion}"></td>
            <td>
                <!-- Botón Editar que abre un modal único por cliente -->
                <button class="btn btn-warning" data-bs-toggle="modal" th:data-bs-target="'#modalEditar' + ${client.id}">
                    <i class="fa-solid fa-pen-to-square"></i>
                </button>

                <!-- Enlace Eliminar -->
                <a class="btn btn-danger" th:href="@{/clientes/eliminar/{id}(id=${client.id})}"
                   onclick="return confirm('¿Estás seguro de eliminar este cliente?')">
                    <i class="fa-solid fa-trash-can"></i>
                </a>
            </td>

            <!-- MODAL PARA EDITAR (Se genera uno por cada cliente en la lista) -->
            <div class="modal fade" th:id="'modalEditar' + ${client.id}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar Cliente</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form th:action="@{/clientes/save}" method="post">
                                <input type="hidden" name="id" th:value="${client.id}">
                                <div class="mb-3">
                                    <label class="form-label">Nombre:</label>
                                    <input type="text" name="nombre" th:value="${client.nombre}" class="form-control">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Teléfono:</label>
                                    <input type="text" name="telefono" th:value="${client.telefono}" class="form-control">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Dirección:</label>
                                    <input type="text" name="direccion" th:value="${client.direccion}" class="form-control">
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Fin Modal Editar -->

        </tr>
        </tbody>
    </table>
</div>

<!-- MODAL PARA NUEVO CLIENTE (Fuera del bucle) -->
<div class="modal fade" id="modalNuevoCliente" tabindex="-1" aria-labelledby="nuevoClienteLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="nuevoClienteLabel">Registrar Nuevo Cliente</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/clientes/save}" th:object="${cliente}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="mb-3">
                        <label class="col-form-label">Nombre del Cliente:</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="col-form-label">Teléfono:</label>
                        <input type="text" th:field="*{telefono}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="col-form-label">Dirección:</label>
                        <input type="text" th:field="*{direccion}" class="form-control">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar Cliente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
