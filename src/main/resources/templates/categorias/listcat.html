<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CRUD Categorías</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Gestión de Categorías</h4>

            <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#modalNuevo">
                Nueva Categoría
            </button>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th width="180">Acciones</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="cat : ${cats}">
                    <td th:text="${cat.id}"></td>
                    <td th:text="${cat.nombre}"></td>
                    <td>
                        <button class="btn btn-warning btn-sm"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#modalEditar' + ${cat.id}">
                            Editar
                        </button>

                        <button class="btn btn-danger btn-sm"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#modalEliminar' + ${cat.id}">
                            Eliminar
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>
</div>

<!-- MODAL NUEVO -->
<div class="modal fade" id="modalNuevo" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form th:action="@{/categorias/save}" method="post">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Nueva Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <label class="form-label">Nombre</label>
                    <input type="text"
                           name="nombre"
                           class="form-control"
                           placeholder="Ingrese el nombre"
                           required>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Guardar
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- MODALES EDITAR Y ELIMINAR -->
<div th:each="cat : ${cats}">

    <!-- MODAL EDITAR -->
    <div class="modal fade" th:id="'modalEditar' + ${cat.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <form th:action="@{/categorias/save}" method="post">
                    <div class="modal-header bg-warning">
                        <h5 class="modal-title">Editar Categoría</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <input type="hidden" name="id" th:value="${cat.id}">

                        <label class="form-label">Nombre</label>
                        <input type="text"
                               name="nombre"
                               class="form-control"
                               th:value="${cat.nombre}"
                               required>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-warning">
                            Actualizar
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <!-- MODAL ELIMINAR -->
    <div class="modal fade" th:id="'modalEliminar' + ${cat.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Eliminar Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p>
                        ¿Está seguro de eliminar la categoría
                        <strong th:text="${cat.nombre}"></strong>?
                    </p>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <a class="btn btn-danger"
                       th:href="@{/categorias/eliminar/{id}(id=${cat.id})}">
                        Sí, eliminar
                    </a>
                </div>

            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
